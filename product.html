<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Product — Maati Ka Swad</title>
  <meta name="description" content="Detailed view of our traditional homemade Indian food product.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div id="page-loader"><div class="loader-inner"><div class="loader-logo">माटी का स्वाद</div><div class="loader-spinner"></div></div></div>
<div id="toast-container"></div>
<div class="search-overlay" id="search-overlay">
  <div class="search-box"><span>🔍</span><input type="text" id="search-input" placeholder="Search products..."><button class="search-btn" onclick="document.getElementById('search-overlay').classList.remove('open')">✕</button></div>
  <div class="search-results" id="search-results"></div>
</div>

<nav class="navbar opaque">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">🍶 Maati Ka <span>Swad</span></a>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="shop.html" class="nav-link active">Shop</a></li>
      <li><a href="about.html" class="nav-link">About</a></li>
      <li><a href="contact.html" class="nav-link">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-icon-btn search-open-btn">🔍</button>
      <a href="login.html" class="nav-icon-btn nav-user-btn">👤</a>
      <a href="cart.html" class="nav-icon-btn" style="position:relative">🛒 <span class="cart-count" style="display:none"></span></a>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
  <div class="mobile-menu">
    <a href="index.html" class="nav-link">🏠 Home</a>
    <a href="shop.html" class="nav-link">🛍️ Shop</a>
    <a href="cart.html" class="nav-link">🛒 Cart</a>
  </div>
</nav>

<section class="product-detail-section">
  <div class="container">
    <!-- Breadcrumb -->
    <div class="breadcrumb" style="color:var(--text-muted);margin-bottom:24px">
      <a href="index.html">Home</a><span class="breadcrumb-sep">/</span>
      <a href="shop.html">Shop</a><span class="breadcrumb-sep">/</span>
      <span id="breadcrumb-name">Product</span>
    </div>

    <div class="product-detail-grid" id="product-detail-grid">
      <!-- Populated by JS -->
      <div class="skeleton" style="aspect-ratio:1;border-radius:var(--radius-xl)"></div>
      <div>
        <div class="skeleton mb-16" style="height:24px;width:60%"></div>
        <div class="skeleton mb-12" style="height:40px"></div>
        <div class="skeleton mb-32" style="height:20px;width:40%"></div>
      </div>
    </div>
  </div>
</section>

<!-- Tabs section -->
<section class="product-tabs-section" id="product-tabs" style="display:none">
  <div class="container">
    <div class="tabs-header">
      <button class="tab-btn active" onclick="switchTab('description', this)">Description</button>
      <button class="tab-btn" onclick="switchTab('ingredients', this)">Ingredients</button>
      <button class="tab-btn" onclick="switchTab('benefits', this)">Benefits</button>
      <button class="tab-btn" onclick="switchTab('reviews', this)">Reviews</button>
    </div>
    <div class="tab-panel active" id="tab-description"></div>
    <div class="tab-panel" id="tab-ingredients"></div>
    <div class="tab-panel" id="tab-benefits"></div>
    <div class="tab-panel" id="tab-reviews"></div>
  </div>
</section>

<!-- Related Products -->
<section class="related-section" id="related-section" style="display:none">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">You Might Also Like</span>
      <h2 class="section-title">Related Products</h2>
    </div>
    <div class="grid-4" id="related-grid"></div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="border-top:none;padding:32px 0">
      <span>© 2024 Maati Ka Swad. All rights reserved.</span>
      <div class="payment-badges"><span class="payment-badge">UPI</span><span class="payment-badge">Cards</span><span class="payment-badge">COD</span></div>
    </div>
  </div>
</footer>

<a href="https://wa.me/919876543210" class="whatsapp-btn" target="_blank">💬</a>

<script src="js/products.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/product.js"></script>
</body>
</html>
