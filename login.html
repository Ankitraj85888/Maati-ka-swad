<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Sign Up — Maati Ka Swad</title>
  <meta name="description" content="Create an account or sign in to manage your orders and wishlist on Maati Ka Swad.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div id="page-loader"><div class="loader-inner"><div class="loader-logo">माटी का स्वाद</div><div class="loader-spinner"></div></div></div>
<div id="toast-container"></div>

<!-- Background -->
<div style="position:fixed;inset:0;background:linear-gradient(135deg,var(--secondary) 0%,var(--primary-dark) 100%);z-index:-1"></div>
<div style="position:fixed;inset:0;opacity:.06;background-image:radial-gradient(circle at 2px 2px,rgba(255,255,255,1) 1px,transparent 0);background-size:40px 40px;z-index:-1"></div>

<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <a href="index.html" class="nav-logo" style="justify-content:center;margin-bottom:8px;color:white">
        🍶 Maati Ka <span style="color:rgba(255,255,255,.7)">Swad</span>
      </a>
      <p style="color:rgba(255,255,255,.7);font-size:.88rem">माटी का स्वाद — Taste of the Soil</p>
    </div>
    <div class="login-body">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchAuthTab('signup')">Create Account</button>
      </div>

      <!-- Login Form -->
      <div class="auth-form active" id="form-login">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="login-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position:relative">
            <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
            <button type="button" onclick="togglePwd('login-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)">👁</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:.82rem">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
            <input type="checkbox" style="accent-color:var(--primary)"> Remember me
          </label>
          <a href="#" style="color:var(--primary)">Forgot password?</a>
        </div>
        <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign In →</button>
        <div class="login-divider"><div class="login-divider-line"></div><span class="login-divider-text">or continue with</span><div class="login-divider-line"></div></div>
        <div class="social-login">
          <button class="social-login-btn" onclick="socialLogin('google')">🔍 Google</button>
          <button class="social-login-btn" onclick="socialLogin('facebook')">📘 Facebook</button>
        </div>
        <p style="text-align:center;font-size:.82rem;color:var(--text-muted);margin-top:20px">
          Don't have an account? <a href="#" onclick="switchAuthTab('signup')" style="color:var(--primary)">Create one →</a>
        </p>
      </div>

      <!-- Signup Form -->
      <div class="auth-form" id="form-signup">
        <div class="product-form-grid" style="gap:12px">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" id="signup-fname" placeholder="Ramesh" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" id="signup-lname" placeholder="Sharma">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="signup-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="signup-phone" placeholder="+91 98765 43210">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position:relative">
            <input type="password" class="form-control" id="signup-password" placeholder="Min. 6 characters" required>
            <button type="button" onclick="togglePwd('signup-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)">👁</button>
          </div>
        </div>
        <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:16px;line-height:1.6">
          By creating an account, you agree to our <a href="#" style="color:var(--primary)">Terms of Service</a> and <a href="#" style="color:var(--primary)">Privacy Policy</a>.
        </div>
        <button class="btn btn-primary btn-full" onclick="handleSignup()">Create Account →</button>
        <p style="text-align:center;font-size:.82rem;color:var(--text-muted);margin-top:20px">
          Already have an account? <a href="#" onclick="switchAuthTab('login')" style="color:var(--primary)">Sign in →</a>
        </p>
      </div>

      <!-- Guest checkout hint -->
      <div style="text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--cream-dark)">
        <a href="shop.html" style="font-size:.8rem;color:var(--text-muted)">Continue as Guest →</a>
      </div>
    </div>
  </div>
</div>

<script src="js/products.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
